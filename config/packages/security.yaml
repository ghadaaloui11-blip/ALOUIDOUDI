security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"
  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email
  role_hierarchy:
    ROLE_ADMIN: [ROLE_BIBLIOTHECAIRE, ROLE_ADHERENT]
    ROLE_BIBLIOTHECAIRE: [ROLE_USER]
    ROLE_ADHERENT: [ROLE_USER]

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false
    main:
      lazy: true
      provider: app_user_provider
      custom_authenticator: App\Security\UserAuthenticator
      logout:
        path: app_logout
      remember_me:
        secret: "%kernel.secret%"
        lifetime: 604800
        path: /
        always_remember_me: true

  access_control:
    - { path: ^/register, roles: PUBLIC_ACCESS }
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/adherent, roles: ROLE_ADMIN }
    - { path: ^/bibliothecaire, roles: ROLE_ADMIN }
    - { path: ^/emprunt, roles: ROLE_ADMIN }
    - { path: ^/dashboard/bibliothecaire, roles: ROLE_BIBLIOTHECAIRE }
    - { path: ^/dashboard/adherent, roles: ROLE_ADHERENT }
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/$, roles: PUBLIC_ACCESS }

when@test:
  security:
    password_hashers:
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4
        time_cost: 3
        memory_cost: 10
